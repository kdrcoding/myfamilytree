<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Oq-Ariq OILASI — interaktiv oilaviy shajara sayti. Oq-Ariq family tree website."
    />
    <title>Oq-Ariq OILASI</title>
    <script>
      // Apply the saved theme before React mounts to avoid a flash of the wrong
      // theme. Dark is the default: the page starts dark unless the visitor has
      // explicitly chosen the light theme.
      (function () {
        try {
          var raw = localStorage.getItem('familytree.settings.v1');
          var theme = raw ? JSON.parse(raw).theme : null;
          if (theme !== 'light') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Oq-Ariq OILASI — interaktiv oilaviy shajara sayti. Oq-Ariq family tree website."
    />
    <title>Oq-Ariq OILASI</title>
    <script>
      // Apply the saved theme before React mounts to avoid a flash of the wrong theme.
      (function () {
        try {
          var raw = localStorage.getItem('familytree.settings.v1');
          var theme = raw ? JSON.parse(raw).theme : null;
          if (theme === 'dark' || (!theme && matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {
          /* corrupted settings are handled by the app itself */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
